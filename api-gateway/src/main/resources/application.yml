server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**,/admin/**

        - id: team-service
          uri: http://localhost:8082
          predicates:
            - Path=/teams/**

        - id: tournament-service
          uri: http://localhost:8083
          predicates:
            - Path=/tournaments/**